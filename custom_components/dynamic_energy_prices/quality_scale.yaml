rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register custom actions.
  docs-conditions:
    status: exempt
    comment: This integration does not have any conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: This integration does not have any triggers.
  entity-event-setup:
    status: exempt
    comment: Entities do not explicitly subscribe to events in async_added_to_hass.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure:
    status: exempt
    comment: Integration does not use test-before-configure pattern.
  test-before-setup:
    status: exempt
    comment: Integration does not use test-before-setup pattern.
  unique-config-entry:
    status: exempt
    comment: Multiple config entries are supported (single_config_entry: false).

  # Silver
  action-exceptions:
    status: exempt
    comment: Integration does not register custom actions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates:
    status: exempt
    comment: Integration type is 'service' with DataUpdateCoordinator; hassfest rejects parallel_updates for service integrations.
  reauthentication-flow:
    status: exempt
    comment: Integration does not require authentication.
  test-coverage: done

  # Gold
  devices:
    status: exempt
    comment: Integration does not create device registry entries (service integration type).
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: No discovery mechanism.
  discovery:
    status: exempt
    comment: No discovery mechanism.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: No physical devices.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: No dynamically discovered devices.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations:
    status: exempt
    comment: Exceptions are internal (re-raised as UpdateFailed); user-facing errors use the repair issue flow with translations.
  icon-translations:
    status: exempt
    comment: Entities use default icons from device_class (MONETARY, TIMESTAMP, DIAGNOSTIC) — no custom icons needed.
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: exempt
    comment: No devices to become stale.
